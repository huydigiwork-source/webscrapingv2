name: Autonomous Job Intelligence System

on:
  push:
    branches: [ main ]

jobs:
  swarm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Swarm
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_ID: ${{ secrets.HF_DATASET_ID }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          PYTHONPATH=. python ci/swarm_orchestrator.py