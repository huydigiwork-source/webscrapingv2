name: CI Pipeline

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout full history
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # =========================
      # Setup Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =========================
      # Debug (optional)
      # =========================
      - name: Show git info
        run: |
          git log -1 --oneline
          git status

      # =========================
      # Run pipeline
      # =========================
      - name: Run pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_ID: ${{ secrets.HF_DATASET_ID }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}   # 🔥 ADD THIS
        run: |
          python ci/pipeline.py