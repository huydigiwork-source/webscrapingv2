name: CareerViet Scraper

on:

workflow_dispatch:

push:
branches:
- main

schedule:
- cron: "0 */6 * * *"

jobs:

scrape:

runs-on: ubuntu-latest

timeout-minutes: 360

steps:

  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - run: pip install -r requirements.txt

  - run: python scraper.py

  - run: python upload_hf.py
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}


