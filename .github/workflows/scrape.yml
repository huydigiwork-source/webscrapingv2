name: CareerViet Scraper

on:
  push:
    branches: [ main ]

  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scraper.py

      - name: Upload HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python upload_hf.py